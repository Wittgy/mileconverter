<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mile & Kilometer Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mile.css">
</head>
<body>
    <div class="brand">
        <span class="brand-icon">↔</span>
        <span class="brand-text">Converter</span>
    </div>

    <div class="card">
        <div class="card-header">
            <p class="hint">
                K / M <span class="divider">·</span> toggle mode
                <span class="footnote">(PC only)</span>
            </p>
        </div>
        <div class="card-body">
            <h2><i>Mil</i> değerini <i>kilometre</i> cinsinden hesaplar</h2>
            <form action="somephpfile.php" method="post" id="convert">
                <div class="input-group">
                    <input type="text" placeholder="Mesafe" id="distance" name="distance" autocomplete="off">
                    <input type="submit" name="convertdistance" value="Hesapla">
                </div>
            </form>
        </div>
        <div class="card-footer" id="answer">
            <p id="answerP"></p>
        </div>
    </div>

    <div class="credit">
        <p id="designword">Designed by Burak&#174</p>
    </div>

    <script src="mile.js"></script>
</body>
</html>
